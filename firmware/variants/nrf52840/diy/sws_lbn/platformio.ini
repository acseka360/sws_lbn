; E73-2G4M08S1C + E22-900MM22S (SX1262) custom Meshtastic target
; Base chosen for USB CDC / UF2 workflow. If your bootloader matches a different
; Adafruit nRF52 board family, only the `board = ...` line should need changing.

[env:sws_lbn]
board_level = extra
extends = nrf52840_base
board = promicro-nrf52840
build_flags =
    ${nrf52840_base.build_flags}
    -Ivariants/nrf52840/diy/sws_lbn
build_src_filter = ${nrf52_base.build_src_filter} +<../variants/nrf52840/diy/sws_lbn>
debug_tool = jlink

; Meshtastic will still generate UF2/USB artifacts from the selected board family.
; If upload/reset behavior does not match the bootloader you flashed over SWD,
; keep this variant directory and only swap the board above.
